<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Hard Puzzle Tester (No Enemy Queens)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Trebuchet MS',sans-serif;background:linear-gradient(135deg,#1a4a1a,#4a1a1a);min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:16px;color:#f5e6c8;}
h1{font-size:20px;color:#c0392b;margin-bottom:4px;text-align:center;}
.subtitle{font-size:12px;color:#aaa;margin-bottom:12px;text-align:center;}
.nav{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.nav button{background:#c0392b;border:none;color:#fff;font-family:'Trebuchet MS',sans-serif;font-weight:700;font-size:14px;padding:8px 16px;border-radius:8px;cursor:pointer;}
.nav button:disabled{background:#444;color:#888;cursor:default;}
.puzzle-num{font-size:16px;font-weight:700;color:#f5e6c8;min-width:80px;text-align:center;}
#board-wrap{display:inline-block;}
#board{display:grid;grid-template-columns:repeat(5,var(--sq));grid-template-rows:repeat(5,var(--sq));border:3px solid #c0392b;border-radius:6px;overflow:hidden;}
:root{--sq:min(calc((100vw - 32px)/5), 72px);}
.sq{width:var(--sq);height:var(--sq);display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;}
.sq.light{background:#8b5e3c;}
.sq.dark{background:#4a2f1a;}
.sq.threatened-enemy{background:#cc4444!important;}
.sq.safe-mine{background:#2d7a3a!important;}
.sq.threatened-mine{background:#aa2222!important;}
.sq.hint-sq{background:#b8960a!important;}
.piece{width:78%;height:78%;object-fit:contain;pointer-events:none;user-select:none;}
.piece.my-piece{filter:brightness(1.4);}
#piece-select{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:10px;flex-wrap:wrap;}
.sel-piece{width:52px;height:52px;border-radius:10px;border:2px solid #555;background:#1a2d40;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sel-piece.active{border-color:#c0392b;background:#2a1a1a;}
.sel-piece img{width:70%;height:70%;object-fit:contain;}
#feedback{margin-top:8px;font-size:13px;color:#a0b0c0;text-align:center;min-height:20px;}
#status{margin-top:6px;font-size:13px;text-align:center;font-weight:700;}
.solved{color:#4caf50;}
.info{display:flex;gap:20px;margin-bottom:8px;font-size:12px;color:#aaa;justify-content:center;}
.info span b{color:#f5e6c8;}
#show-sol{background:#555;border:none;color:#fff;font-family:'Trebuchet MS',sans-serif;font-size:12px;padding:6px 12px;border-radius:6px;cursor:pointer;margin-top:6px;}
#show-sol:hover{background:#777;}
</style>
</head>
<body>
<h1>♟️ Hard Puzzle Tester</h1>
<p class="subtitle">No Enemy Queens — 10 Puzzles</p>
<div class="nav">
  <button id="prev" onclick="changePuzzle(-1)">← Prev</button>
  <span class="puzzle-num" id="pnum">1 / 10</span>
  <button id="next" onclick="changePuzzle(1)">Next →</button>
</div>
<div class="info">
  <span>Enemies: <b id="etypes"></b></span>
  <span>Your pieces: <b id="mtypes"></b></span>
</div>
<div id="board-wrap"><div id="board"></div></div>
<div id="piece-select"></div>
<div id="feedback">Select a piece, then place it.</div>
<div id="status"></div>
<button id="show-sol" onclick="showSolution()">Show Solution</button>
<script>
const PUZZLES = [{"enemies": [{"t": "R", "k": 17}, {"t": "B", "k": 5}, {"t": "B", "k": 22}, {"t": "N", "k": 23}, {"t": "P", "k": 12}, {"t": "P", "k": 0}], "myTypes": ["B", "R", "Q"], "tier": "hard"}, {"enemies": [{"t": "B", "k": 6}, {"t": "P", "k": 13}, {"t": "R", "k": 23}, {"t": "N", "k": 1}, {"t": "P", "k": 17}, {"t": "B", "k": 14}], "myTypes": ["B", "N", "R"], "tier": "hard"}, {"enemies": [{"t": "P", "k": 5}, {"t": "R", "k": 7}, {"t": "P", "k": 0}, {"t": "N", "k": 19}, {"t": "B", "k": 9}, {"t": "B", "k": 13}], "myTypes": ["P", "R", "N"], "tier": "hard"}, {"enemies": [{"t": "B", "k": 5}, {"t": "R", "k": 13}, {"t": "N", "k": 16}, {"t": "P", "k": 17}, {"t": "R", "k": 22}, {"t": "P", "k": 1}], "myTypes": ["R", "N", "Q"], "tier": "hard"}, {"enemies": [{"t": "R", "k": 18}, {"t": "R", "k": 11}, {"t": "N", "k": 16}, {"t": "B", "k": 7}, {"t": "P", "k": 4}, {"t": "P", "k": 5}], "myTypes": ["N", "B", "Q"], "tier": "hard"}, {"enemies": [{"t": "R", "k": 10}, {"t": "P", "k": 19}, {"t": "N", "k": 16}, {"t": "N", "k": 3}, {"t": "B", "k": 7}, {"t": "B", "k": 17}], "myTypes": ["Q", "P", "N"], "tier": "hard"}, {"enemies": [{"t": "R", "k": 9}, {"t": "B", "k": 15}, {"t": "N", "k": 8}, {"t": "B", "k": 0}, {"t": "P", "k": 17}, {"t": "N", "k": 12}], "myTypes": ["N", "B", "Q"], "tier": "hard"}, {"enemies": [{"t": "N", "k": 11}, {"t": "R", "k": 15}, {"t": "R", "k": 18}, {"t": "B", "k": 13}, {"t": "P", "k": 17}, {"t": "P", "k": 10}], "myTypes": ["N", "Q", "R"], "tier": "hard"}, {"enemies": [{"t": "P", "k": 17}, {"t": "P", "k": 9}, {"t": "R", "k": 21}, {"t": "N", "k": 24}, {"t": "R", "k": 2}, {"t": "B", "k": 18}], "myTypes": ["N", "R", "P"], "tier": "hard"}, {"enemies": [{"t": "P", "k": 2}, {"t": "R", "k": 18}, {"t": "R", "k": 0}, {"t": "B", "k": 16}, {"t": "N", "k": 12}, {"t": "N", "k": 23}], "myTypes": ["Q", "N", "B"], "tier": "hard"}];

const PIECE_UNICODE = {Q:'♛',R:'♜',B:'♝',N:'♞',P:'♟'};

let currentIdx = 0;
let puzzle = null;
let myBoard = {};
let selectedType = null;
let solShown = false;

function nk(r,c){return r*5+c;}
function fk(k){return[Math.floor(k/5),k%5];}
function inB(r,c){return r>=0&&r<5&&c>=0&&c<5;}

function getAttacks(type,r,c,occ,pd){
  const out=new Set();
  if(type==='N'){for(const[dr,dc]of[[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]])if(inB(r+dr,c+dc))out.add(nk(r+dr,c+dc));}
  else if(type==='P'){for(const[dr,dc]of[[pd,-1],[pd,1]])if(inB(r+dr,c+dc))out.add(nk(r+dr,c+dc));}
  else{const dirs=[];if(type==='R'||type==='Q')dirs.push([0,1],[0,-1],[1,0],[-1,0]);if(type==='B'||type==='Q')dirs.push([1,1],[1,-1],[-1,1],[-1,-1]);for(const[dr,dc]of dirs){let nr=r+dr,nc=c+dc;while(inB(nr,nc)){out.add(nk(nr,nc));if(occ.has(nk(nr,nc)))break;nr+=dr;nc+=dc;}}}
  return out;
}

function computeThreats(){
  const occ=new Set([...puzzle.enemies.map(e=>e.k),...Object.keys(myBoard).map(Number)]);
  const eT=new Set(),mT=new Set();
  for(const e of puzzle.enemies){const[r,c]=fk(e.k);for(const s of getAttacks(e.t,r,c,occ,1))eT.add(s);}
  for(const[k,t]of Object.entries(myBoard)){const[r,c]=fk(Number(k));for(const s of getAttacks(t,r,c,occ,-1))mT.add(s);}
  return{eT,mT};
}

function isValid(enemies,mine){
  const occ=new Set([...enemies.map(e=>e.k),...mine.map(m=>m.k)]);
  const eT=new Set();
  for(const e of enemies){const[r,c]=fk(e.k);for(const s of getAttacks(e.t,r,c,occ,1))eT.add(s);}
  const eKeys=new Set(enemies.map(e=>e.k));
  const coverage=mine.map(m=>{const[r,c]=fk(m.k);const atk=getAttacks(m.t,r,c,occ,-1);const cov=new Set();for(const k of atk)if(eKeys.has(k))cov.add(k);return cov;});
  for(const m of mine)if(eT.has(m.k))return false;
  for(const e of enemies)if(!coverage.some(c=>c.has(e.k)))return false;
  for(let i=0;i<mine.length;i++){const others=new Set();for(let j=0;j<mine.length;j++)if(j!==i)for(const k of coverage[j])others.add(k);if(![...coverage[i]].some(k=>!others.has(k)))return false;}
  return true;
}

function remCounts(){
  const placed={};
  for(const t of Object.values(myBoard))placed[t]=(placed[t]||0)+1;
  const rem={};
  for(const t of puzzle.myTypes)rem[t]=(rem[t]||0)+1;
  for(const[t,n]of Object.entries(placed))rem[t]=(rem[t]||0)-n;
  return rem;
}

function loadPuzzle(idx){
  puzzle=PUZZLES[idx];
  myBoard={};selectedType=null;solShown=false;
  document.getElementById('pnum').textContent=(idx+1)+' / '+PUZZLES.length;
  document.getElementById('prev').disabled=idx===0;
  document.getElementById('next').disabled=idx===PUZZLES.length-1;
  document.getElementById('etypes').textContent=puzzle.enemies.map(e=>e.t).join(' ');
  document.getElementById('mtypes').textContent=puzzle.myTypes.join(' ');
  document.getElementById('status').textContent='';
  document.getElementById('feedback').textContent='Select a piece, then place it.';
  renderBoard();renderSel();
}

function renderBoard(){
  const el=document.getElementById('board');
  el.innerHTML='';
  const{eT,mT}=computeThreats();
  const solved=checkSolved();
  for(let r=0;r<5;r++)for(let c=0;c<5;c++){
    const sq=document.createElement('div');
    sq.className='sq '+((r+c)%2===0?'light':'dark');
    const k=nk(r,c);
    const enemy=puzzle.enemies.find(e=>e.k===k);
    const myT=myBoard[k];
    if(enemy){if(mT.has(k))sq.classList.add('threatened-enemy');}
    else if(myT!=null){sq.classList.add(eT.has(k)?'threatened-mine':'safe-mine');}
    if(enemy||myT){
      const sp=document.createElement('span');
      sp.style.cssText='font-size:calc(var(--sq)*0.55);line-height:1;'+(enemy?'':'filter:brightness(1.5);');
      sp.textContent=PIECE_UNICODE[enemy?enemy.t:myT];
      sq.appendChild(sp);
    }
    sq.addEventListener('click',()=>onClick(k));
    el.appendChild(sq);
  }
  if(solved&&!solShown){
    document.getElementById('status').className='solved';
    document.getElementById('status').textContent='✓ Solved!';
  }
}

function checkSolved(){
  const mine=Object.entries(myBoard).map(([k,t])=>({t,k:Number(k)}));
  if(mine.length!==puzzle.myTypes.length)return false;
  return isValid(puzzle.enemies,mine);
}

function onClick(k){
  const enemy=puzzle.enemies.find(e=>e.k===k);
  if(enemy)return;
  if(myBoard[k]!=null){
    delete myBoard[k];selectedType=null;
    renderBoard();renderSel();
    document.getElementById('status').textContent='';
    return;
  }
  if(!selectedType)return;
  const rem=remCounts();
  if((rem[selectedType]||0)<=0){document.getElementById('feedback').textContent='No '+selectedType+' pieces left.';return;}
  myBoard[k]=selectedType;
  selectedType=null;
  renderBoard();renderSel();
  const mine=Object.entries(myBoard).map(([k,t])=>({t,k:Number(k)}));
  const covered=new Set();
  const occ=new Set([...puzzle.enemies.map(e=>e.k),...mine.map(m=>m.k)]);
  for(const m of mine){const[r,c]=fk(m.k);const atk=getAttacks(m.t,r,c,occ,-1);for(const s of atk)if(puzzle.enemies.find(e=>e.k===s))covered.add(s);}
  document.getElementById('feedback').textContent=covered.size+'/'+puzzle.enemies.length+' enemies threatened. '+(puzzle.myTypes.length-mine.length)+' piece(s) left.';
}

function renderSel(){
  const el=document.getElementById('piece-select');
  el.innerHTML='';
  const rem=remCounts();
  const seen={};
  for(const t of puzzle.myTypes){
    if(seen[t])continue;seen[t]=true;
    const n=rem[t]||0;
    for(let i=0;i<Math.max(1,puzzle.myTypes.filter(x=>x===t).length);i++){
      const btn=document.createElement('div');
      btn.className='sel-piece'+(selectedType===t?' active':'');
      btn.style.opacity=n<=i?'0.3':'1';
      btn.innerHTML='<span style="font-size:28px;line-height:1;">'+PIECE_UNICODE[t]+'</span>';
      btn.addEventListener('click',()=>{if(n>0){selectedType=t;renderSel();}});
      el.appendChild(btn);
    }
  }
}

function showSolution(){
  // Find and display the solution
  const eKeys=new Set(puzzle.enemies.map(e=>e.k));
  const empties=[];for(let i=0;i<25;i++)if(!eKeys.has(i))empties.push(i);
  const sorted=[...puzzle.myTypes].sort((a,b)=>['Q','R','B','N','P'].indexOf(a)-['Q','R','B','N','P'].indexOf(b));
  let sol=null;
  function bt(i,placed,used){
    if(sol)return;
    if(i===sorted.length){if(isValid(puzzle.enemies,placed)){sol=[...placed];}return;}
    for(const sq of empties){
      if(used.has(sq))continue;
      used.add(sq);placed.push({t:sorted[i],k:sq});
      bt(i+1,placed,used);
      placed.pop();used.delete(sq);
      if(sol)return;
    }
  }
  bt(0,[],new Set());
  if(sol){
    myBoard={};
    for(const m of sol)myBoard[m.k]=m.t;
    solShown=true;
    document.getElementById('status').className='';
    document.getElementById('status').textContent='Solution shown';
    renderBoard();renderSel();
  }
}

function changePuzzle(dir){
  currentIdx=Math.max(0,Math.min(PUZZLES.length-1,currentIdx+dir));
  loadPuzzle(currentIdx);
}

loadPuzzle(0);
</script>
</body>
</html>
