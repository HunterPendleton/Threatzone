<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threat Zone</title>

<style>

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#fdf6ee;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:20px 8px 48px;}
#app{display:flex;flex-direction:column;align-items:center;gap:14px;max-width:440px;width:100%;position:relative;padding-bottom:env(safe-area-inset-bottom,0px);}
h1{font-family:'Fredoka One',cursive;font-size:30px;color:#c0392b;letter-spacing:1px;text-align:center;margin-top:8px;}
#subtitle{font-size:13px;color:#888;text-align:center;max-width:340px;line-height:1.5;}
#board{display:grid;grid-template-columns:repeat(5,var(--sq,64px));grid-template-rows:repeat(5,var(--sq,64px));border:3px solid #8b2020;border-radius:8px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.15);}
.sq{width:var(--sq,64px);height:var(--sq,64px);display:flex;align-items:center;justify-content:center;user-select:none;cursor:pointer;transition:background .12s;}
.sq.light{background:#f5deb3;}.sq.dark{background:#cd853f;}
.sq.threatened-enemy{background:#ff9999 !important;}
.sq.threatened-mine{background:#ff5555 !important;}
.sq.safe-mine{background:#90ee90 !important;}
.sq.hint-sq{background:#ffe066 !important;}
.piece{pointer-events:none;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.3));}
#legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;font-size:12px;font-weight:700;color:#555;}
.leg{display:flex;align-items:center;gap:5px;}
.leg-sq{width:13px;height:13px;border-radius:3px;border:1px solid rgba(0,0,0,0.12);}
#piece-select{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;}
#piece-select>span{font-size:13px;font-weight:700;color:#888;}
.sel-piece{width:46px;height:46px;background:#fff;border:2px solid #ddd;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color 0.1s,transform 0.1s;position:relative;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.sel-piece:hover{transform:scale(1.08);border-color:#aaa;}
.sel-piece.active{border-color:#c03030;background:#fff0f0;transform:scale(1.1);}
.sel-piece.exhausted{opacity:0.28;pointer-events:none;}
.badge{position:absolute;top:-7px;right:-7px;background:#c03030;color:white;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;}
#controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
button{font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;padding:9px 18px;border-radius:10px;border:2px solid;cursor:pointer;transition:transform 0.1s,box-shadow 0.1s;}
button:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,0.15);}
button:active{transform:scale(0.97);}
button:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
#btn-reset{background:#ffd97d;border-color:#c08020;color:#5a3000;}
#btn-hint{background:#c9b1f5;border-color:#6a3ab0;color:#2a0a60;}
#btn-pause{background:#d4eaff;border-color:#1a6ab0;color:#002a60;}
#btn-pause.active{background:#ffd4d4;border-color:#c03030;color:#6a0000;}
#btn-share{background:#90caf9;border-color:#1565c0;color:#0a2a50;}
#feedback{font-size:14px;font-weight:700;padding:10px 20px;border-radius:12px;text-align:center;min-width:240px;transition:all 0.3s;line-height:1.4;}
.fb-ok{background:#d4f7d4;color:#1a5a1a;border:2px solid #3ab03a;}
.fb-fail{background:#ffd4d4;color:#7a1a1a;border:2px solid #c03030;}
.fb-idle{background:#f5f0e8;color:#888;border:2px solid #ddd;}
#score-row{display:flex;gap:16px;align-items:center;font-size:13px;color:#7a2020;font-weight:700;}
#timer-display{font-family:'Fredoka One',cursive;font-size:20px;color:#c0392b;letter-spacing:1px;min-width:70px;text-align:center;}
#puzzle-nav{display:flex;align-items:center;gap:12px;justify-content:center;}
#puzzle-label{font-family:'Fredoka One',cursive;font-size:18px;color:#c0392b;min-width:110px;text-align:center;}
#btn-prev,#btn-next{background:#fff9c4;border:2px solid #c08020;color:#5a3000;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;padding:7px 14px;border-radius:10px;cursor:pointer;transition:transform 0.1s;}
#btn-prev:hover,#btn-next:hover{transform:translateY(-1px);}
#btn-prev:disabled,#btn-next:disabled{opacity:0.35;cursor:not-allowed;transform:none;}
#btn-hint[data-level="1"]{background:#c9b1f5;border-color:#6a3ab0;color:#2a0a60;}
#btn-hint[data-level="2"]{background:#b1d4f5;border-color:#1a6ab0;color:#002a60;}
#btn-hint[data-level="3"]{background:#f5c9b1;border-color:#b05a1a;color:#602a00;}
.hint-sq-threats{background:#ffaaaa !important;}
#board-wrap{position:relative;display:inline-block;}
#board-blur-overlay{display:none;position:absolute;inset:0;background:rgba(253,246,238,0.82);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-radius:8px;z-index:10;align-items:center;justify-content:center;}
#board-blur-overlay span{font-family:'Fredoka One',cursive;font-size:28px;color:#c0392b;letter-spacing:1px;}
#board-wrap.paused #board-blur-overlay{display:flex;}
.confetti-piece{position:fixed;width:10px;height:10px;top:-10px;opacity:1;animation:confetti-fall linear forwards;pointer-events:none;z-index:9999;border-radius:2px;}
@keyframes confetti-fall{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1;}80%{opacity:1;}100%{transform:translateY(100vh) rotate(720deg) scale(0.6);opacity:0;}}

/* ── Tutorial piece flash ── */
@keyframes tut-flash {
  0%,100% { opacity: 1; transform: scale(1); }
  40%      { opacity: 0.25; transform: scale(0.85); }
  70%      { opacity: 1; transform: scale(1.15); }
}
.tut-sq.flashing img { animation: tut-flash 0.7s ease infinite; }

/* ── Side drawer ── */
#drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:100;}
#drawer-overlay.open{display:block;}
#drawer{position:fixed;top:0;right:-320px;width:300px;height:100vh;background:#fff9f0;border-left:3px solid #c0392b;z-index:101;transition:right 0.3s ease;display:flex;flex-direction:column;overflow:hidden;}
#drawer.open{right:0;}
#drawer-header{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:2px solid #f0ddd0;background:#c0392b;}
#drawer-header h2{font-family:'Fredoka One',cursive;color:white;font-size:18px;}
#drawer-close{background:none;border:none;color:white;font-size:22px;cursor:pointer;padding:0 4px;line-height:1;}
#drawer-close:hover{transform:scale(1.2);box-shadow:none;}
#drawer-list{flex:1;overflow-y:auto;padding:8px 0;}
.drawer-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-bottom:1px solid #f0ead8;transition:background 0.1s;}
.drawer-item:hover{background:#fff3e0;}
.drawer-item.active-puzzle{background:#fff0f0;border-left:3px solid #c0392b;}
.drawer-item .di-num{font-family:'Fredoka One',cursive;color:#c0392b;min-width:80px;font-size:14px;}
.drawer-item .di-status{font-size:12px;color:#888;}
.drawer-item .di-time{font-family:'Fredoka One',cursive;font-size:13px;color:#3ab03a;margin-left:auto;}
#btn-archive{background:#ffe0b2;border-color:#e65100;color:#bf360c;}
#btn-tutorial{background:#e8f5e9;border-color:#2e7d32;color:#1b5e20;font-size:11px;padding:6px 12px;}

/* ── Tutorial modal ── */
#tutorial-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;}
#tutorial-overlay.open{display:flex;}
#tutorial-modal{background:#fff9f0!important;color:#333!important;border:3px solid #c0392b;border-radius:18px;max-width:380px;width:90%;max-height:88vh;overflow-y:auto;padding:24px 20px;position:relative;display:flex;flex-direction:column;gap:16px;}
#tutorial-modal h2{font-family:'Fredoka One',cursive;color:#c0392b;font-size:22px;text-align:center;}
#tutorial-modal p{font-size:13px;color:#555;line-height:1.6;text-align:center;}
#tutorial-close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:22px;cursor:pointer;color:#999;padding:0;}
#tutorial-close:hover{color:#c0392b;transform:scale(1.2);box-shadow:none;}
.tut-nav{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:4px;}
.tut-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;padding:10px 20px;border-radius:10px;border:2px solid;cursor:pointer;}
.tut-btn-primary{background:#c0392b!important;border-color:#922b21!important;color:#fff!important;}
.tut-btn-secondary{background:#f5f0e8!important;border-color:#ddd!important;color:#555!important;}
.tut-board{display:grid;grid-template-columns:repeat(5,48px);grid-template-rows:repeat(5,48px);border:2px solid #8b2020;border-radius:6px;overflow:hidden;margin:0 auto;}
.tut-sq{width:48px;height:48px;display:flex;align-items:center;justify-content:center;}
.tut-sq.light{background:#f5deb3;}.tut-sq.dark{background:#cd853f;}
.tut-sq.tut-highlight{background:#ffe066 !important;}
.tut-sq.tut-enemy{background:#ff9999 !important;}
.tut-sq.tut-safe{background:#90ee90 !important;}
.tut-step-title{font-family:'Fredoka One',cursive;color:#c0392b;font-size:16px;text-align:center;}
.tut-rule{background:#fff3e0;border:2px solid #ffb74d;border-radius:10px;padding:10px 14px;font-size:13px;color:#5d4037;font-weight:700;text-align:center;}
.tut-progress{display:flex;gap:6px;justify-content:center;}
.tut-dot{width:8px;height:8px;border-radius:50%;background:#ddd;}
.tut-dot.active{background:#c0392b;}

/* ── Tutorial piece flash ── */
@keyframes tut-flash {
  0%,100% { opacity: 1; transform: scale(1); }
  40%      { opacity: 0.25; transform: scale(0.85); }
  70%      { opacity: 1; transform: scale(1.15); }
}
.tut-sq.flashing img { animation: tut-flash 0.7s ease infinite; }
body.dark-mode .tier-btn.active.easy-btn{background:#2e7d32!important;color:#fff!important;}
body.dark-mode .tier-btn.active.medium-btn{background:#e65100!important;color:#fff!important;}
body.dark-mode .tier-btn.active.hard-btn{background:#c62828!important;color:#fff!important;}

.toggle input{opacity:0;width:0;height:0;}

<div id="app">
  <div id="top-row">
    <button id="btn-menu">&#9776;</button>
    <h1>Threat Zone &#9823;&#65039;</h1>
    <div id="daily-header">
      <div id="date-display"></div>
      <div id="streak-row"><span>&#128293; <b id="streak-count">0</b></span></div>
    </div>
  </div>
  <div id="tier-switcher">
    <button class="tier-btn easy-btn active" onclick="switchTier('easy')">Easy &#9733;&#9734;&#9734;</button>
    <button class="tier-btn medium-btn" onclick="switchTier('medium')">Medium &#9733;&#9733;&#9734;</button>
    <button class="tier-btn hard-btn" onclick="switchTier('hard')">Hard &#9733;&#9733;&#9733;</button>
  </div>
  <div id="par-row">
    <span id="placement-count">0</span>
    <span id="par-label">placements</span>
    <span id="timer-display" style="visibility:hidden;">00:00</span>
  </div>
  <div id="already-solved-banner"></div>
  <div class="spacer"></div>
  <div id="board-wrap">
    <div id="board"></div>
    <div id="board-blur-overlay"><span>&#9208; Paused</span></div>
    <div id="score-overlay">
      <button id="score-close">&#10005;</button>
      <div id="score-label"></div>
      <div id="score-stars"></div>
      <div id="score-time"></div>
      <div id="score-detail"></div>
    </div>
  </div>
  <div class="spacer"></div>
  <div id="piece-select"><span>Place:</span></div>
  <div id="legend">
    <div class="leg"><div class="leg-sq" style="background:#ff9999"></div>Threatened</div>
    <div class="leg"><div class="leg-sq" style="background:#90ee90"></div>Safe</div>
    <div class="leg"><div class="leg-sq" style="background:#ff5555"></div>Danger!</div>
  </div>
  <div id="controls">
    <button id="btn-pause">&#9208; Pause</button>
    <button id="btn-hint">Hint &#10022;</button>
    <button id="btn-share">Share</button>
    <button id="btn-archive">Archive</button>
    <button id="btn-tutorial">How to Play</button>
  </div>
  <div id="feedback" class="fb-idle">Select a piece, then place it.</div>
</div>

<!-- Archive drawer -->
<div id="drawer-overlay"></div>
<div id="drawer">
  <div id="drawer-header">
    <h2>&#128218; Archive</h2>
    <button id="drawer-close">&#10005;</button>
  </div>
  <div id="drawer-list"></div>
</div>

<div id="tutorial-overlay">
  <div id="tutorial-modal">
    <button id="tutorial-close">&#10005;</button>
    <h2>&#9823;&#65039; Threat Zone</h2>
    <div id="tutorial-content"></div>
  </div>
</div>

<!-- Menu modal -->
<div id="menu-overlay">
  <div id="menu-modal">
    <button id="menu-close">&#10005;</button>
    <h2>&#9823;&#65039; Menu</h2>
    <div class="menu-row">
      <span>Dark Mode</span>
      <label class="toggle"><input type="checkbox" id="dark-toggle"><span class="toggle-slider"></span></label>
    </div>
    <div class="menu-row">
      <span>Contact</span>
      <a href="mailto:threatzone.app@gmail.com">threatzone.app@gmail.com</a>
    </div>
  </div>
</div>

function inB(r,c){return r>=0&&r<5&&c>=0&&c<5;}
function nk(r,c){return r*5+c;}
function fk(k){return[Math.floor(k/5),k%5];}

function getAttacks(type,r,c,occupied,pawnDir=1){
  const out=new Set();
  if(type==='N'){
    for(const[dr,dc]of[[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]])
      if(inB(r+dr,c+dc))out.add(nk(r+dr,c+dc));
  }else if(type==='P'){
    for(const[dr,dc]of[[pawnDir,-1],[pawnDir,1]])
      if(inB(r+dr,c+dc))out.add(nk(r+dr,c+dc));
  }else{
    const dirs=[];
    if(type==='R'||type==='Q')dirs.push([0,1],[0,-1],[1,0],[-1,0]);
    if(type==='B'||type==='Q')dirs.push([1,1],[1,-1],[-1,1],[-1,-1]);
    for(const[dr,dc]of dirs){
      let nr=r+dr,nc=c+dc;
      while(inB(nr,nc)){out.add(nk(nr,nc));if(occupied.has(nk(nr,nc)))break;nr+=dr;nc+=dc;}
    }
  }
  return out;
}

function checkSol(enemies,mine){
  const occ=new Set([...enemies.map(e=>e.k),...mine.map(m=>m.k)]);
  const eT=new Set(),mT=new Set();
  for(const e of enemies){const[r,c]=fk(e.k);for(const s of getAttacks(e.t,r,c,occ,1))eT.add(s);}
  for(const m of mine){const[r,c]=fk(m.k);for(const s of getAttacks(m.t,r,c,occ,-1))mT.add(s);}
  for(const m of mine)if(eT.has(m.k))return false;
  for(const e of enemies)if(!mT.has(e.k))return false;
  return true;
}

function solve(enemies,myTypes){
  const eKeys=new Set(enemies.map(e=>e.k));
  const empties=[];for(let i=0;i<25;i++)if(!eKeys.has(i))empties.push(i);
  const order=['Q','R','B','N','P'];
  const sorted=[...myTypes].sort((a,b)=>order.indexOf(a)-order.indexOf(b));
  let sol=null;
  function bt(i,placed,used){
    if(sol)return;
    if(i===sorted.length){if(checkSol(enemies,placed))sol=[...placed];return;}
    for(const sq of empties){
      if(used.has(sq))continue;
      used.add(sq);placed.push({t:sorted[i],k:sq});
      bt(i+1,placed,used);
      placed.pop();used.delete(sq);
      if(sol)return;
    }
  }
  bt(0,[],new Set());return sol;
}

let puzzle=null,solution=null,myBoard={},selectedType=null,hintsThisSession=0,hintLevel=0;
let isPaused=false;
let currentPuzzleIndex=0;
const winsStore={};

function getOcc(){
  const s=new Set(puzzle.enemies.map(e=>e.k));
  for(const k of Object.keys(myBoard))s.add(+k);
  return s;
}
function computeThreats(){
  const occ=getOcc();
  const eT=new Set(),mT=new Set();
  for(const e of puzzle.enemies){const[r,c]=fk(e.k);for(const s of getAttacks(e.t,r,c,occ,1))eT.add(s);}
  for(const[k,t]of Object.entries(myBoard)){const[r,c]=fk(+k);for(const s of getAttacks(t,r,c,occ,-1))mT.add(s);}
  return{eT,mT};
}
function remCounts(){
  const c={};
  for(const t of puzzle.myTypes)c[t]=(c[t]||0)+1;
  for(const t of Object.values(myBoard))if(c[t]!=null)c[t]--;
  return c;
}
function totalRem(){return Object.values(remCounts()).reduce((a,b)=>a+b,0);}

// ── Render ────────────────────────────────────────────────────────────────────
function renderBoard(hintKey=null){
  const el=document.getElementById('board');
  el.innerHTML='';
  const{eT,mT}=computeThreats();
  for(let r=0;r<5;r++)for(let c=0;c<5;c++){
    const sq=document.createElement('div');
    sq.className='sq '+((r+c)%2===0?'light':'dark');
    const k=nk(r,c);
    const enemy=puzzle.enemies.find(e=>e.k===k);
    const myT=myBoard[k];
    if(k===hintKey)sq.classList.add('hint-sq');
    else if(enemy){if(mT.has(k))sq.classList.add('threatened-enemy');}
    else if(myT!=null){sq.classList.add(eT.has(k)?'threatened-mine':'safe-mine');}
    if(enemy){
      const sp=document.createElement('img');sp.className='piece enemy-piece';
      sp.src=PIECE_IMGS.enemy[enemy.t]||'';
      sp.style.cssText=enemy.t==='P'?'width:60%;height:60%;object-fit:contain;pointer-events:none;'
        :(enemy.t==='N'||enemy.t==='R'||enemy.t==='B'?'width:70%;height:70%;object-fit:contain;pointer-events:none;'
        :'width:85%;height:85%;object-fit:contain;pointer-events:none;');
      sq.appendChild(sp);
    }else if(myT!=null){
      const sp=document.createElement('img');sp.className='piece my-piece';
      sp.src=PIECE_IMGS.player[myT]||'';
      sp.style.cssText=myT==='P'?'width:60%;height:60%;object-fit:contain;pointer-events:none;'
        :(myT==='N'||myT==='R'||myT==='B'?'width:70%;height:70%;object-fit:contain;pointer-events:none;'
        :'width:85%;height:85%;object-fit:contain;pointer-events:none;');
      sq.appendChild(sp);
    }
    sq.addEventListener('click',()=>onClick(k));
    el.appendChild(sq);
  }
}

function renderSel(){
  const el=document.getElementById('piece-select');
  if(!el)return;
  el.innerHTML='<span>Place:</span>';
  const rem=remCounts();
  const seen=new Set();
  for(const t of puzzle.myTypes){
    if(seen.has(t))continue;seen.add(t);
    const n=rem[t]||0;
    const btn=document.createElement('div');
    btn.className='sel-piece'+(selectedType===t?' active':'')+(n<=0?' exhausted':'');
    const timg=document.createElement('img');
    timg.src=PIECE_IMGS.player[t]||'';
    timg.style.cssText=t==='P'?'width:60%;height:60%;object-fit:contain;'
      :(t==='N'||t==='R'||t==='B'?'width:70%;height:70%;object-fit:contain;'
      :'width:28px;height:28px;object-fit:contain;');
    btn.appendChild(timg);btn.title=t+' ('+n+' left)';
    btn.addEventListener('click',()=>{if(n>0){selectedType=t;renderSel();}});
    el.appendChild(btn);
  }
}

// ── Interactions ──────────────────────────────────────────────────────────────
function onClick(k){
  if(puzzle.enemies.find(e=>e.k===k))return;
  startTimer();
  if(myBoard[k]!=null){
    delete myBoard[k];
    selectedType=null;
    renderBoard();renderSel();autoFB();
    document.getElementById('btn-hint').removeAttribute('data-level');
    return;
  }
  if(!selectedType){setFB('idle','Select a piece type above first!');return;}
  const rem=remCounts();
  if(!(rem[selectedType]>0)){
    const next=puzzle.myTypes.find(t=>(rem[t]||0)>0);
    if(next){selectedType=next;renderSel();}else{setFB('idle','No more pieces to place!');return;}
    return;
  }
  myBoard[k]=selectedType;
  if(typeof placements!=='undefined'){placements++;updateParDisplay();}
  selectedType=null;
  renderBoard();renderSel();autoFB();
}

function setFB(type,msg){
  const fb=document.getElementById('feedback');
  fb.className=type==='ok'?'fb-ok':type==='fail'?'fb-fail':'fb-idle';
  fb.textContent=msg;
}

function autoFB(){
  const{eT,mT}=computeThreats();
  const myKeys=Object.keys(myBoard).map(Number);
  if(!myKeys.length){setFB('idle','Select a piece above, then click a square.');return;}
  const danger=myKeys.filter(k=>eT.has(k));
  if(danger.length){setFB('fail',danger.length+' of your pieces '+(danger.length>1?'are':'is')+' threatened!');return;}
  const covered=puzzle.enemies.filter(e=>mT.has(e.k)).length;
  const rem=totalRem();
  const total=puzzle.enemies.length;
  if(covered===total&&rem===0){onSolved();return;}
  setFB('idle',covered+'/'+total+' enemies threatened. '+rem+' piece'+(rem!==1?'s':'')+' left to place.');
}

function onSolved(){
  const finalTime=formatTime(timerSeconds);
  saveWin(currentPuzzleIndex,myBoard,timerSeconds,hintsThisSession);
  setFB('ok',`Solved in ${finalTime} \u{1F389}`);
  launchConfetti();
  stopTimer();
  {const _bh=document.getElementById('btn-hint');if(_bh)_bh.disabled=true;}
}

document.getElementById('btn-reset')?.addEventListener('click',()=>{
  myBoard={};
  hintLevel=0;hintsThisSession=0;
  document.getElementById('btn-hint').removeAttribute('data-level');
  {const _bh=document.getElementById('btn-hint');if(_bh)_bh.disabled=false;}
  const rem=remCounts();
  selectedType=puzzle.myTypes.find(t=>(rem[t]||0)>0)||puzzle.myTypes[0];
  if(typeof clearPersistedTimer==='function')clearPersistedTimer();
  renderBoard();renderSel();setFB('idle','Select a piece above, then click a square.');
});

document.getElementById('btn-hint')?.addEventListener('click',()=>{
  if(!solution)solution=solve(puzzle.enemies,puzzle.myTypes);
  if(!solution){setFB('idle','No hint available.');return;}
  hintLevel=Math.min(hintLevel+1,3);
  hintsThisSession++;
  document.getElementById('btn-hint').dataset.level=hintLevel;
  if(hintLevel===1){
    const rem=remCounts();
    for(const s of solution){
      if(myBoard[s.k]===s.t)continue;
      if((rem[s.t]||0)>0){renderBoard(s.k);setFB('idle','A piece belongs on the highlighted square.');return;}
    }
    setFB('idle','Hint: try removing a misplaced piece first.');
  }else if(hintLevel===2){
    const rem=remCounts();
    for(const s of solution){
      if(myBoard[s.k]===s.t)continue;
      if((rem[s.t]||0)>0){myBoard[s.k]=s.t;selectedType=s.t;renderBoard();renderSel();autoFB();setFB('idle','Piece placed for you.');return;}
    }
    setFB('idle','Hint: try removing a misplaced piece first.');
  }else if(hintLevel===3){
    renderBoardWithThreats();
    setFB('idle','Red squares show all enemy-threatened spaces.');
    {const _bh=document.getElementById('btn-hint');if(_bh)_bh.disabled=true;}
  }
});

// ── Confetti ──────────────────────────────────────────────────────────────────
function launchConfetti(){
  const colors=['#c0392b','#f39c12','#2ecc71','#3498db','#9b59b6','#1abc9c','#e74c3c','#f1c40f'];
  const shapes=['square','circle','strip'];
  for(let i=0;i<120;i++){
    setTimeout(()=>{
      const el=document.createElement('div');el.className='confetti-piece';
      const shape=shapes[Math.floor(Math.random()*shapes.length)];
      const color=colors[Math.floor(Math.random()*colors.length)];
      const size=6+Math.random()*8,left=Math.random()*100;
      const duration=1.8+Math.random()*1.8,delay=Math.random()*0.4;
      el.style.cssText=`left:${left}vw;width:${shape==='strip'?size*.4:size}px;height:${shape==='strip'?size*2.5:size}px;background:${color};border-radius:${shape==='circle'?'50%':'2px'};animation-duration:${duration}s;animation-delay:${delay}s;`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),(duration+delay+0.2)*1000);

let timerSeconds=0,timerInterval=null,timerRunning=false;
function formatTime(s){const m=Math.floor(s/60),sec=s%60;return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;}
function startTimer(){if(timerRunning)return;timerRunning=true;timerInterval=setInterval(()=>{timerSeconds++;const td=document.getElementById('timer-display');if(td)td.textContent=formatTime(timerSeconds);if(typeof persistRunningTimer==='function')persistRunningTimer();},1000);}

// ── Wins store ────────────────────────────────────────────────────────────────
const LS_WINS='tz_wins_v3';

function loadWinsFromStorage(){
  try{
    const raw=localStorage.getItem(LS_WINS);
    if(!raw)return;
    const saved=JSON.parse(raw);
    for(const k of Object.keys(saved)){
      const w=saved[k];
      // JSON stringifies numeric keys — restore board keys as numbers
      const board={};
      for(const bk of Object.keys(w.board)) board[+bk]=w.board[bk];
      winsStore[k]={...w, board};
    }
  }catch{}
}

function persistWins(){
  try{ localStorage.setItem(LS_WINS, JSON.stringify(winsStore)); }catch{}
}

function saveWin(idx,board,time,hints){
  winsStore[idx]={board:{...board},time,hints};
  persistWins();
  renderDrawer();
}

// ── Piece movement animation ──────────────────────────────────────────────────
function buildTutPieceBoard(type, highlighted){
  const wrap=document.getElementById('tut-board-wrap');
  if(!wrap) return;
  const grid=document.createElement('div');
  grid.className='tut-board';
  for(let i=0;i<25;i++){
    const sq=document.createElement('div');
    const r=Math.floor(i/5),c=i%5;
    sq.className='tut-sq '+((r+c)%2===0?'light':'dark');
    if(i===12){
      if(highlighted.size>0) sq.classList.add('flashing');
      const img=document.createElement('img');
      img.src=PIECE_IMGS.enemy[type]||'';
      img.style.cssText=type==='P'?'width:60%;height:60%;object-fit:contain;'
        :(type==='N'||type==='R'||type==='B'?'width:70%;height:70%;object-fit:contain;'
        :'width:85%;height:85%;object-fit:contain;');
      sq.appendChild(img);
    } else if(highlighted.has(i)){
      sq.classList.add('tut-highlight');
    }
    grid.appendChild(sq);
  }
  wrap.innerHTML='';
  wrap.appendChild(grid);
}

function animateTutPiece(type, allAttacks){
  const attackArr=[...allAttacks];
  let step=0;
  const highlighted=new Set();
  function tick(){
    if(!document.getElementById('tut-board-wrap')) return;
    if(step<attackArr.length){
      highlighted.add(attackArr[step]);
      buildTutPieceBoard(type, highlighted);
      step++;
      tutState.animFrame=setTimeout(tick, 110);
    } else {
      tutState.animFrame=setTimeout(()=>{
        highlighted.clear(); step=0; tick();
      }, 1400);
    }
  }
  tick();
}

function buildDemoBoard(step){
  const wrap=document.getElementById('tut-board-wrap');
  if(!wrap) return;

  const placed = DEMO_SOLUTION.slice(0, step.placedCount||0);
  const grid=document.createElement('div');
  grid.className='tut-board';

  const coveredEnemies=new Set();
  for(const m of placed){
    const[r,c]=fk(m.k);
    const atk=getAttacks(m.t,r,c,DEMO_OCC,-1);
    for(const k of atk) if(DEMO_EKEYS.has(k)) coveredEnemies.add(k);
  }

  const activeEnemyKey = step.animEnemyIdx!=null ? DEMO_ENEMY_ATKS[step.animEnemyIdx].k : null;
  const activePlayerKey = step.highlightPlayerIdx!=null ? DEMO_PLAYER_ATKS[step.highlightPlayerIdx].k : null;
  // For animating enemy attacks we use the current animated set stored in tutState
  const enemyHighlights = tutState.enemyHighlights || new Set();

  for(let i=0;i<25;i++){
    const sq=document.createElement('div');
    const r=Math.floor(i/5),c=i%5;
    sq.className='tut-sq '+((r+c)%2===0?'light':'dark');
    const enemy=DEMO_ENEMIES.find(e=>e.k===i);
    const player=placed.find(m=>m.k===i);

    if(step.animEnemyIdx!=null){
      if(!enemy&&!player&&enemyHighlights.has(i)) sq.classList.add('tut-enemy');
      if(i===activeEnemyKey) sq.classList.add('flashing');
    }
    if(step.highlightPlayerIdx!=null){
      const pa=DEMO_PLAYER_ATKS[step.highlightPlayerIdx];
      if(!enemy&&pa.atks.has(i)) sq.classList.add('tut-enemy');
      if(enemy&&pa.atks.has(i)) sq.classList.add('tut-highlight');
      if(i===activePlayerKey) sq.classList.add('flashing');
    }

    if(enemy){
      if(step.showAllCovered&&coveredEnemies.has(i)) sq.classList.add('tut-highlight');
      const img=document.createElement('img');
      img.src=PIECE_IMGS.enemy[enemy.t]||'';
      img.style.cssText=enemy.t==='P'?'width:60%;height:60%;object-fit:contain;'
        :(enemy.t==='N'||enemy.t==='R'||enemy.t==='B'?'width:70%;height:70%;object-fit:contain;'
        :'width:85%;height:85%;object-fit:contain;');
      sq.appendChild(img);
    } else if(player){
      sq.classList.add('tut-safe');
      const img=document.createElement('img');
      img.src=PIECE_IMGS.player[player.t]||'';
      img.style.cssText=player.t==='P'?'width:60%;height:60%;object-fit:contain;'
        :(player.t==='N'||player.t==='R'||player.t==='B'?'width:70%;height:70%;object-fit:contain;'
        :'width:85%;height:85%;object-fit:contain;');
      sq.appendChild(img);
    }
    grid.appendChild(sq);
  }
  wrap.innerHTML='';
  wrap.appendChild(grid);
}

function renderDemoStep(){
  const content=document.getElementById('tutorial-content');
  const step=DEMO_STEPS[tutState.demoStep];

  const ruleHTML = step.rule
    ? `<div class="tut-rule" style="${step.ruleStyle||''}">${step.rule}</div>`
    : '';
  const captionHTML = step.caption
    ? `<div id="tut-caption" style="font-size:13px;color:#555;text-align:center;min-height:32px;padding:4px 8px;font-weight:700;">${step.caption}</div>`
    : `<div id="tut-caption" style="min-height:8px;"></div>`;
  const progressHTML = `<div class="tut-step-title" style="font-size:13px;">Puzzle #3: Medium Walkthrough</div>`;

  content.innerHTML=`
    ${progressHTML}
    <div id="tut-board-wrap" style="display:flex;justify-content:center"></div>
    ${captionHTML}
    ${ruleHTML}
    <div class="tut-nav">
      ${tutState.demoStep>0?'<button class="tut-btn tut-btn-secondary" onclick="demoPrev()">← Back</button>':''}
      <button class="tut-btn tut-btn-primary" id="tut-next-btn" onclick="${step.isLast?'tutStart()':'demoNext()'}">${step.btnLabel}</button>
    </div>`;

  // Reset animated highlights
  tutState.enemyHighlights = new Set();
  buildDemoBoard(step);

  // If this step has an enemy to animate, start the animation but stop when done
  if(step.animEnemyIdx!=null){
    const ea = DEMO_ENEMY_ATKS[step.animEnemyIdx];
    const attackArr=[...ea.atks];
    let idx=0;
    function tick(){
      if(!document.getElementById('tut-board-wrap')) return;
      if(idx<attackArr.length){
        tutState.enemyHighlights.add(attackArr[idx]);
        buildDemoBoard(step);
        idx++;
        tutState.animFrame=setTimeout(tick,120);
      }
      // Stop when done — user clicks Next
    }
    tick();
  }
}

function demoNext(){
  if(tutState.animFrame){clearTimeout(tutState.animFrame);tutState.animFrame=null;}
  tutState.demoStep=Math.min(tutState.demoStep+1, DEMO_STEPS.length-1);
  renderDemoStep();
}
function demoPrev(){
  if(tutState.animFrame){clearTimeout(tutState.animFrame);tutState.animFrame=null;}
  tutState.demoStep=Math.max(tutState.demoStep-1, 0);
  renderDemoStep();
}

function tutGoChess(known){
  if(tutState.animFrame){clearTimeout(tutState.animFrame);tutState.animFrame=null;}
  tutState.screen=known?'rules':'pieces';
  tutState.pieceIdx=0;
  tutState.demoStep=0;
  renderTutorial();
}
function tutPieceNext(){
  if(tutState.animFrame){clearTimeout(tutState.animFrame);tutState.animFrame=null;}
  if(tutState.pieceIdx<4){tutState.pieceIdx++;renderTutorial();}
  else{tutState.screen='rules';tutState.demoStep=0;renderTutorial();}
}
function tutPiecePrev(){
  if(tutState.animFrame){clearTimeout(tutState.animFrame);tutState.animFrame=null;}
  if(tutState.pieceIdx>0){tutState.pieceIdx--;renderTutorial();}
}
function tutStart(){
  closeTutorial(true);
  localStorage.setItem('tz_tutorial_done','1');
}
function maybeShowTutorial(){
  if(!localStorage.getItem('tz_tutorial_done')) openTutorial();
}

const EPOCH = new Date('2026-04-01T00:00:00');
const LS_DAILY = 'tz_daily_v3';

function getDayIndex(){
  const now=new Date();
  const local=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const diff=Math.floor((local-EPOCH)/86400000);
  return Math.max(0,Math.min(diff,89)); // 90 days
}

function todayStr(){
  const n=new Date();return `${n.getFullYear()}-${n.getMonth()+1}-${n.getDate()}`;
}
function loadDS(){try{return JSON.parse(localStorage.getItem(LS_DAILY)||'{}');}catch{return{};}}
function saveDS(s){localStorage.setItem(LS_DAILY,JSON.stringify(s));}

function isTierSolvedToday(tier){
  const s=loadDS(); return s[tier]&&s[tier].date===todayStr();
}

function recordTierSolve(tier,time,hints){
  const s=loadDS();
  const today=todayStr();
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yst=`${yesterday.getFullYear()}-${yesterday.getMonth()+1}-${yesterday.getDate()}`;
  // Streak: count days where ALL three tiers solved
  if(!s.streakDate||s.streakDate!==today){
    // Check if yesterday was complete
    const yComplete=s.yesterdayComplete||false;
    s.streak=yComplete?(s.streak||0)+1:1;
    s.streakDate=today;
  }
  s[tier]={date:today,time,hints};
  // Mark yesterday complete for tomorrow's streak check
  const allDone=['easy','medium','hard'].every(t=>s[t]&&s[t].date===today);
  if(allDone){s.yesterdayComplete=true;}
  saveDS(s);
  return{streak:s.streak||1};
}

function puzzleDate(idx){
  const d=new Date(EPOCH);d.setDate(d.getDate()+idx);return d;
}
function formatDate(d){
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function updateStreakUI(){
  const s=loadDS();
  document.getElementById('streak-count').textContent=s.streak||0;
}

const _sharedRenderBoard = renderBoard;
function renderBoard(hintKey=null){
  const el=document.getElementById('board');
  if(!el)return;
  el.innerHTML='';
  const{eT,mT}=computeThreats();
  const bh=document.getElementById('btn-hint');

  const showHL=(currentTier==='easy')||solved;

    const sq=document.createElement('div');
    sq.className='sq '+((r+c)%2===0?'light':'dark');
    const k=nk(r,c);
    const enemy=puzzle.enemies.find(e=>e.k===k);
    const myT=myBoard[k];
    if(k===hintKey)sq.classList.add('hint-sq');
    else if(enemy){if(showHL&&mT.has(k))sq.classList.add('threatened-enemy');}

      const sp=document.createElement('img');sp.className='piece enemy-piece';

        :(enemy.t==='N'||enemy.t==='R'||enemy.t==='B'?'width:70%;height:70%;object-fit:contain;pointer-events:none;'
        :'width:85%;height:85%;object-fit:contain;pointer-events:none;');
      sq.appendChild(sp);
    }else if(myT!=null){
      const sp=document.createElement('img');sp.className='piece my-piece';
      sp.src=PIECE_IMGS.player[myT]||'';
      sp.style.cssText=myT==='P'?'width:60%;height:60%;object-fit:contain;pointer-events:none;'
        :(myT==='N'||myT==='R'||myT==='B'?'width:70%;height:70%;object-fit:contain;pointer-events:none;'
        :'width:85%;height:85%;object-fit:contain;pointer-events:none;');
      sq.appendChild(sp);
    }
    sq.addEventListener('click',()=>onClick(k));
    el.appendChild(sq);
  }
}

// ── Timer hidden until solve ──────────────────────────────────────────────────
// Hide timer display on load, reveal on solve
function hideTimer(){const td=g('timer-display');if(td)td.style.visibility='hidden';}
function showTimer(){const td=g('timer-display');if(td)td.style.visibility='visible';}

// ── Tier state ────────────────────────────────────────────────────────────────
let currentTier='easy';
let placements=0;
const SCORE_LABELS=['Room to Grow','Good Effort','Great Job','Amazing','Exceptional'];
function updateParDisplay(){const el=g('placement-count');if(el)el.textContent=placements;}
function resetPar(){placements=0;updateParDisplay();const o=g('score-overlay');if(o)o.classList.remove('visible');}
function getStars(placed,par){const o=placed-par;return o<=-1?5:o===0?4:o===1?3:o===2?2:1;}
function starStr(n){return '★'.repeat(n)+'☆'.repeat(5-n);}


function g(id){return document.getElementById(id);}

function switchTier(tier){
  currentTier=tier;
  document.querySelectorAll('.tier-btn').forEach(b=>b.classList.remove('active'));
  const tb=document.querySelector('.'+tier+'-btn');
  if(tb)tb.classList.add('active');
  // Show legend only for easy
  const leg=g('legend');
  if(leg)leg.style.display=(tier==='easy')?'flex':'none';
  loadTierPuzzle(tier,currentPuzzleIndex);
}

function loadTierPuzzle(tier,idx){
  currentTier=tier;
  currentPuzzleIndex=idx;
  puzzle=TIER_BANK[tier][idx];
  solution=null;myBoard={};hintsThisSession=0;hintLevel=0;isPaused=false;selectedType=null;
  resetPar();
  const bw=g('board-wrap');if(bw)bw.classList.remove('paused');
  const bp=g('btn-pause');if(bp){bp.textContent='\u23F8 Pause';bp.classList.remove('active');}
  const bh=g('btn-hint');if(bh){bh.disabled=false;bh.removeAttribute('data-level');}
  selectedType=puzzle.myTypes[0];
  resetTimer();
  hideTimer();

  // Update date display
  const dd=g('date-display');if(dd)dd.textContent=formatDate(puzzleDate(idx))+' · #'+(idx+1);

  // Always hide banner first; only show it for today's puzzle
  const banner=g('already-solved-banner');
  if(banner)banner.style.display='none';

  // Check if already solved
  const winKey=tier+'-'+idx;
  const isToday=(idx===getDayIndex());
  if(winsStore[winKey]&&isToday&&isTierSolvedToday(tier)){
    const w=winsStore[winKey];
    myBoard={...w.board};timerSeconds=w.time;
    const td=g('timer-display');if(td){td.textContent=formatTime(w.time);td.style.visibility='visible';}
    if(bh)bh.disabled=true;
    placements=w.placements||0;updateParDisplay();
    renderBoard();renderSel();
    showDailyScoreCard();
    showSolvedBanner(tier);
  }else if(winsStore[winKey]){
    // Solved on a previous day — show board and score overlay
    const w=winsStore[winKey];
    myBoard={...w.board};timerSeconds=w.time;
    const td=g('timer-display');if(td){td.textContent=formatTime(w.time);td.style.visibility='visible';}
    if(bh)bh.disabled=true;
    placements=w.placements||0;updateParDisplay();
    renderBoard();renderSel();
    showDailyScoreCard();
  }else{
    renderBoard();renderSel();
    const fb3=g('feedback');if(fb3)fb3.style.display='';
    const tdh=g('timer-display');if(tdh)tdh.style.visibility='hidden';
    setFB('idle','Select a piece above, then click a square.');
    restoreTimer();
    startTimer();
  }
  updateTierButtons();
}

function showSolvedBanner(tier){
  // Only show banner for today's puzzle
  if(currentPuzzleIndex!==getDayIndex())return;
  const banner=g('already-solved-banner');
  if(!banner)return;
  const s=loadDS();
  const allDone=['easy','medium','hard'].every(t=>isTierSolvedToday(t));
  if(allDone){
    banner.style.display='block';
    banner.textContent=(s.streak>1?'\uD83D\uDD25 '+s.streak+' day streak! ':'')+'All three puzzles solved today! \u2705 Come back tomorrow.';
  }else{
    const remaining=['easy','medium','hard'].filter(t=>!isTierSolvedToday(t));
    banner.style.display='block';
    banner.textContent='\u2705 '+tier.charAt(0).toUpperCase()+tier.slice(1)+' solved! Try the '+remaining.join(' and ')+' puzzle'+(remaining.length>1?'s':'')+'!';
  }
}

function updateTierButtons(){
  ['easy','medium','hard'].forEach(t=>{
    const btn=document.querySelector('.'+t+'-btn');
    if(!btn)return;
    // Use winsStore directly — works for any day, not just today
    if(winsStore[t+'-'+currentPuzzleIndex])btn.classList.add('solved-tier');
    else btn.classList.remove('solved-tier');
  });
}

// Override onSolved
function onSolved(){
  const finalTime=formatTime(timerSeconds);
  const winKey=currentTier+'-'+currentPuzzleIndex;
  winsStore[winKey]={board:{...myBoard},time:timerSeconds,hints:hintsThisSession,placements:placements};
  persistWins();
  clearPersistedTimer();
  const {streak}=recordTierSolve(currentTier,timerSeconds,hintsThisSession);
  stopTimer();
  const bh=g('btn-hint');if(bh)bh.disabled=true;
  updateStreakUI();
  showSolvedBanner(currentTier);
  updateTierButtons();
  // Staggered highlight reveal for medium/hard, then confetti + score
  if(currentTier==='easy'){
    launchConfetti();
    showDailyScoreCard();
  } else {
    staggeredReveal(()=>{launchConfetti();showDailyScoreCard();});
  }
}

function staggeredReveal(callback){
  renderBoard();
  const boardEl=g('board');
  if(!boardEl){callback();return;}
  const squares=[...boardEl.querySelectorAll('.threatened-enemy,.safe-mine,.threatened-mine')];
  squares.forEach(sq=>{sq.style.opacity='0';sq.style.transition='opacity 0.15s ease';});
  squares.forEach((sq,i)=>{setTimeout(()=>{sq.style.opacity='1';},i*60);});
  setTimeout(callback,squares.length*60+200);
}

function showDailyScoreCard(){
  showTimer();
  const leg=g('legend');if(leg&&currentTier==='easy')leg.style.display='flex';
  const par=currentTier==='hard'?5:currentTier==='medium'?5:4;
  const stars=getStars(placements,par);
  const label=SCORE_LABELS[stars-1];
  const overlay=g('score-overlay');
  if(overlay){
    overlay.classList.add('visible');
    g('score-stars').textContent=starStr(stars);
    const sl=g('score-label');if(sl)sl.textContent=label;
    const over=placements-par;
    g('score-detail').textContent=placements+' placement'+(placements>1?'s':'')+' — par '+par;
    const st=g('score-time');if(st)st.textContent=g('timer-display')?g('timer-display').textContent:'';
  }
  const fb=g('feedback');if(fb)fb.style.display='none';
}

// Override share
const _bsEl=g('btn-share');
if(_bsEl){
  const _bs2=_bsEl.cloneNode(true);
  _bsEl.parentNode.replaceChild(_bs2,_bsEl);
  _bs2.addEventListener('click',()=>{
    const winKey=currentTier+'-'+currentPuzzleIndex;
    const w=winsStore[winKey];
    if(!w){setFB('idle','Solve this puzzle first to share!');return;}
    const tierStr=currentTier.charAt(0).toUpperCase()+currentTier.slice(1);
    const par=currentTier==='hard'?5:currentTier==='medium'?5:4;
    const stars=getStars(w.placements||0,par);
    const starsStr=starStr(stars);
    const label=SCORE_LABELS[stars-1];
    const line1='\u265F\uFE0F'+tierStr+' #'+(currentPuzzleIndex+1)+'\u265F\uFE0F';
    const line2='\u265F\uFE0F '+(w.placements||0)+' Guess'+((w.placements||0)!==1?'es':'')+' \u2014 '+starsStr+'\u265F\uFE0F';
    const text=line1+'\n'+line2+'\nwww.threatzone.app';
    if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>setFB('ok','Result copied!')).catch(()=>prompt('Copy:',text));
    else prompt('Copy:',text);
  });
}

// ── Archive drawer ───────────────────────────────────────────────────────────
function renderDrawer(){
  const list=g('drawer-list');
  if(!list)return;
  list.innerHTML='';
  const dayIdx=getDayIndex();
  for(let i=dayIdx;i>=0;i--){
    const date=puzzleDate(i);
    const dateStr=date.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    const row=document.createElement('div');
    row.className='drawer-item'+(i===currentPuzzleIndex?' active-puzzle':'');

    // Build tier pip indicators
    const tiers=['easy','medium','hard'];
    const tierLabels={easy:'E',medium:'M',hard:'H'};
    const tierColors={easy:'#2e7d32',medium:'#e65100',hard:'#c62828'};
    let pips='';
    tiers.forEach(t=>{
      const solved=isTierSolvedToday_idx(t,i);
      pips+=`<span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:${solved?tierColors[t]:'#eee'};color:${solved?'#fff':'#aaa'};font-size:10px;font-weight:800;font-family:'Nunito',sans-serif;">${tierLabels[t]}</span>`;
    });

    row.innerHTML=`<span class="di-num" style="min-width:110px">Day ${i+1} &middot; ${dateStr}</span><span style="display:flex;gap:4px;align-items:center">${pips}</span>`;
    row.style.cursor='pointer';
    row.addEventListener('click',()=>{
      closeDrawer();
      loadTierPuzzle(currentTier,i);
    });
    list.appendChild(row);
  }
}

function isTierSolvedToday_idx(tier,idx){
  // Check winsStore for any win on this day index for this tier
  return !!winsStore[tier+'-'+idx];
}

function openDrawer(){
  renderDrawer();
  const d=g('drawer');const o=g('drawer-overlay');
  if(d)d.classList.add('open');if(o)o.classList.add('open');
}
function closeDrawer(){
  const d=g('drawer');const o=g('drawer-overlay');
  if(d)d.classList.remove('open');if(o)o.classList.remove('open');
}
const _baEl=g('btn-archive');
if(_baEl)_baEl.addEventListener('click',openDrawer);
const _dcEl=g('drawer-close');
if(_dcEl)_dcEl.addEventListener('click',closeDrawer);
const _doEl=g('drawer-overlay');
if(_doEl)_doEl.addEventListener('click',closeDrawer);

// ── Timer persistence ────────────────────────────────────────────────────────
function timerKey(){return 'tz_timer_'+currentTier+'_'+currentPuzzleIndex;}

function persistRunningTimer(){
  try{ localStorage.setItem(timerKey(), timerSeconds); }catch{}
}

function restoreTimer(){
  try{
    const saved=localStorage.getItem(timerKey());
    if(saved!==null){
      timerSeconds=parseInt(saved,10)||0;
      const td=g('timer-display');if(td)td.textContent=formatTime(timerSeconds);
    }
  }catch{}
}

function clearPersistedTimer(){
  try{ localStorage.removeItem(timerKey()); }catch{}
}

// Init
// Wire Try Again button
const _sc=g('score-close');
if(_sc)_sc.addEventListener('click',()=>{const o=g('score-overlay');if(o)o.classList.remove('visible');});
// Menu modal
function openMenu(){g('menu-overlay').classList.add('open');const dt=g('dark-toggle');if(dt)dt.checked=document.body.classList.contains('dark-mode')||(!document.body.classList.contains('light-mode')&&window.matchMedia('(prefers-color-scheme:dark)').matches);}
function closeMenu(){g('menu-overlay').classList.remove('open');}
const _bm=g('btn-menu');if(_bm)_bm.addEventListener('click',openMenu);
const _mc=g('menu-close');if(_mc)_mc.addEventListener('click',closeMenu);
const _mo=g('menu-overlay');if(_mo)_mo.addEventListener('click',(e)=>{if(e.target===_mo)closeMenu();});
const _dt=g('dark-toggle');
if(_dt){
  // Init toggle from stored pref or system
  const stored=localStorage.getItem('tz_theme');
  if(stored==='dark'){document.body.classList.add('dark-mode');}
  else if(stored==='light'){document.body.classList.add('light-mode');}
  _dt.addEventListener('change',()=>{
    if(_dt.checked){document.body.classList.add('dark-mode');document.body.classList.remove('light-mode');localStorage.setItem('tz_theme','dark');}
    else{document.body.classList.remove('dark-mode');document.body.classList.add('light-mode');localStorage.setItem('tz_theme','light');}
  });
}

function init(){
  // Apply stored theme
  const _th=localStorage.getItem('tz_theme');
  if(_th==='dark')document.body.classList.add('dark-mode');
  else if(_th==='light')document.body.classList.add('light-mode');
  loadWinsFromStorage();
  updateStreakUI();
  currentPuzzleIndex = getDayIndex();
  switchTier('easy');
  maybeShowTutorial();
}
init();

// Dynamic board sizing: set --sq based on actual available space
function updateBoardSize(){
  const wrap=document.getElementById('board-wrap');
  if(!wrap)return;
  const app=document.getElementById('app');
  if(!app)return;
  // Available height for board = app height minus all other children heights
  let usedH=0;
  for(const child of app.children){
    if(child.id==='board-wrap')continue;
    usedH+=child.offsetHeight;
  }
  // Also account for app padding
  const appStyle=getComputedStyle(app);
  const padT=parseFloat(appStyle.paddingTop)||0;
  const padB=parseFloat(appStyle.paddingBottom)||0;
  usedH+=padT+padB;
  const availH=app.offsetHeight-usedH;
  const availW=app.offsetWidth-24;
  const sq=Math.floor(Math.min(availH/5, availW/5, 72));
  document.documentElement.style.setProperty('--sq', sq+'px');
}
window.addEventListener('resize',updateBoardSize);
// Run after first render
setTimeout(updateBoardSize,50);

</script>
