<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threat Zone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#fdf6ee;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:20px 8px 48px;}
#app{display:flex;flex-direction:column;align-items:center;gap:14px;max-width:440px;width:100%;position:relative;}
h1{font-family:'Fredoka One',cursive;font-size:30px;color:#c0392b;letter-spacing:1px;text-align:center;margin-top:8px;}
#subtitle{font-size:13px;color:#888;text-align:center;max-width:340px;line-height:1.5;}
#board{display:grid;grid-template-columns:repeat(5,64px);grid-template-rows:repeat(5,64px);border:3px solid #8b2020;border-radius:8px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.15);}
.sq{width:64px;height:64px;display:flex;align-items:center;justify-content:center;user-select:none;cursor:pointer;transition:background 0.12s;}
.sq.light{background:#f5deb3;}.sq.dark{background:#cd853f;}
.sq.threatened-enemy{background:#ff9999 !important;}
.sq.threatened-mine{background:#ff5555 !important;}
.sq.safe-mine{background:#90ee90 !important;}
.sq.hint-sq{background:#ffe066 !important;}
.piece{pointer-events:none;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.3));}
#legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;font-size:12px;font-weight:700;color:#555;}
.leg{display:flex;align-items:center;gap:5px;}
.leg-sq{width:13px;height:13px;border-radius:3px;border:1px solid rgba(0,0,0,0.12);}
#piece-select{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;}
#piece-select>span{font-size:13px;font-weight:700;color:#888;}
.sel-piece{width:46px;height:46px;background:#fff;border:2px solid #ddd;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color 0.1s,transform 0.1s;position:relative;box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.sel-piece:hover{transform:scale(1.08);border-color:#aaa;}
.sel-piece.active{border-color:#c03030;background:#fff0f0;transform:scale(1.1);}
.sel-piece.exhausted{opacity:0.28;pointer-events:none;}
.badge{position:absolute;top:-7px;right:-7px;background:#c03030;color:white;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;}
#controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
button{font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;padding:9px 18px;border-radius:10px;border:2px solid;cursor:pointer;transition:transform 0.1s,box-shadow 0.1s;}
button:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,0.15);}
button:active{transform:scale(0.97);}
button:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
#btn-reset{background:#ffd97d;border-color:#c08020;color:#5a3000;}
#btn-hint{background:#c9b1f5;border-color:#6a3ab0;color:#2a0a60;}
#btn-pause{background:#d4eaff;border-color:#1a6ab0;color:#002a60;}
#btn-pause.active{background:#ffd4d4;border-color:#c03030;color:#6a0000;}
#btn-share{background:#90caf9;border-color:#1565c0;color:#0a2a50;}
#feedback{font-size:14px;font-weight:700;padding:10px 20px;border-radius:12px;text-align:center;min-width:240px;transition:all 0.3s;line-height:1.4;}
.fb-ok{background:#d4f7d4;color:#1a5a1a;border:2px solid #3ab03a;}
.fb-fail{background:#ffd4d4;color:#7a1a1a;border:2px solid #c03030;}
.fb-idle{background:#f5f0e8;color:#888;border:2px solid #ddd;}
#score-row{display:flex;gap:16px;align-items:center;font-size:13px;color:#7a2020;font-weight:700;}
#timer-display{font-family:'Fredoka One',cursive;font-size:20px;color:#c0392b;letter-spacing:1px;min-width:70px;text-align:center;}
#puzzle-nav{display:flex;align-items:center;gap:12px;justify-content:center;}
#puzzle-label{font-family:'Fredoka One',cursive;font-size:18px;color:#c0392b;min-width:110px;text-align:center;}
#btn-prev,#btn-next{background:#fff9c4;border:2px solid #c08020;color:#5a3000;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;padding:7px 14px;border-radius:10px;cursor:pointer;transition:transform 0.1s;}
#btn-prev:hover,#btn-next:hover{transform:translateY(-1px);}
#btn-prev:disabled,#btn-next:disabled{opacity:0.35;cursor:not-allowed;transform:none;}
#btn-hint[data-level="1"]{background:#c9b1f5;border-color:#6a3ab0;color:#2a0a60;}
#btn-hint[data-level="2"]{background:#b1d4f5;border-color:#1a6ab0;color:#002a60;}
#btn-hint[data-level="3"]{background:#f5c9b1;border-color:#b05a1a;color:#602a00;}
.hint-sq-threats{background:#ffaaaa !important;}
#board-wrap{position:relative;display:inline-block;}
#board-blur-overlay{display:none;position:absolute;inset:0;background:rgba(253,246,238,0.82);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-radius:8px;z-index:10;align-items:center;justify-content:center;}
#board-blur-overlay span{font-family:'Fredoka One',cursive;font-size:28px;color:#c0392b;letter-spacing:1px;}
#board-wrap.paused #board-blur-overlay{display:flex;}
.confetti-piece{position:fixed;width:10px;height:10px;top:-10px;opacity:1;animation:confetti-fall linear forwards;pointer-events:none;z-index:9999;border-radius:2px;}
@keyframes confetti-fall{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1;}80%{opacity:1;}100%{transform:translateY(100vh) rotate(720deg) scale(0.6);opacity:0;}}

/* ── Tutorial piece flash ── */
@keyframes tut-flash {
  0%,100% { opacity: 1; transform: scale(1); }
  40%      { opacity: 0.25; transform: scale(0.85); }
  70%      { opacity: 1; transform: scale(1.15); }
}
.tut-sq.flashing img { animation: tut-flash 0.7s ease infinite; }

/* ── Side drawer ── */
#drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:100;}
#drawer-overlay.open{display:block;}
#drawer{position:fixed;top:0;right:-320px;width:300px;height:100vh;background:#fff9f0;border-left:3px solid #c0392b;z-index:101;transition:right 0.3s ease;display:flex;flex-direction:column;overflow:hidden;}
#drawer.open{right:0;}
#drawer-header{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:2px solid #f0ddd0;background:#c0392b;}
#drawer-header h2{font-family:'Fredoka One',cursive;color:white;font-size:18px;}
#drawer-close{background:none;border:none;color:white;font-size:22px;cursor:pointer;padding:0 4px;line-height:1;}
#drawer-close:hover{transform:scale(1.2);box-shadow:none;}
#drawer-list{flex:1;overflow-y:auto;padding:8px 0;}
.drawer-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-bottom:1px solid #f0ead8;transition:background 0.1s;}
.drawer-item:hover{background:#fff3e0;}
.drawer-item.active-puzzle{background:#fff0f0;border-left:3px solid #c0392b;}
.drawer-item .di-num{font-family:'Fredoka One',cursive;color:#c0392b;min-width:80px;font-size:14px;}
.drawer-item .di-status{font-size:12px;color:#888;}
.drawer-item .di-time{font-family:'Fredoka One',cursive;font-size:13px;color:#3ab03a;margin-left:auto;}
#btn-archive{background:#ffe0b2;border-color:#e65100;color:#bf360c;}
#btn-tutorial{background:#e8f5e9;border-color:#2e7d32;color:#1b5e20;font-size:11px;padding:6px 12px;}

/* ── Tutorial modal ── */
#tutorial-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;}
#tutorial-overlay.open{display:flex;}
#tutorial-modal{background:#fff9f0;border:3px solid #c0392b;border-radius:18px;max-width:380px;width:90%;max-height:88vh;overflow-y:auto;padding:24px 20px;position:relative;display:flex;flex-direction:column;gap:16px;}
#tutorial-modal h2{font-family:'Fredoka One',cursive;color:#c0392b;font-size:22px;text-align:center;}
#tutorial-modal p{font-size:13px;color:#555;line-height:1.6;text-align:center;}
#tutorial-close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:22px;cursor:pointer;color:#999;padding:0;}
#tutorial-close:hover{color:#c0392b;transform:scale(1.2);box-shadow:none;}
.tut-nav{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:4px;}
.tut-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;padding:10px 20px;border-radius:10px;border:2px solid;cursor:pointer;}
.tut-btn-primary{background:#c0392b;border-color:#922b21;color:white;}
.tut-btn-secondary{background:#f5f0e8;border-color:#ddd;color:#555;}
.tut-board{display:grid;grid-template-columns:repeat(5,48px);grid-template-rows:repeat(5,48px);border:2px solid #8b2020;border-radius:6px;overflow:hidden;margin:0 auto;}
.tut-sq{width:48px;height:48px;display:flex;align-items:center;justify-content:center;}
.tut-sq.light{background:#f5deb3;}.tut-sq.dark{background:#cd853f;}
.tut-sq.tut-highlight{background:#ffe066 !important;}
.tut-sq.tut-enemy{background:#ff9999 !important;}
.tut-sq.tut-safe{background:#90ee90 !important;}
.tut-step-title{font-family:'Fredoka One',cursive;color:#c0392b;font-size:16px;text-align:center;}
.tut-rule{background:#fff3e0;border:2px solid #ffb74d;border-radius:10px;padding:10px 14px;font-size:13px;color:#5d4037;font-weight:700;text-align:center;}
.tut-progress{display:flex;gap:6px;justify-content:center;}
.tut-dot{width:8px;height:8px;border-radius:50%;background:#ddd;}
.tut-dot.active{background:#c0392b;}

/* ── Tutorial piece flash ── */
@keyframes tut-flash {
  0%,100% { opacity: 1; transform: scale(1); }
  40%      { opacity: 0.25; transform: scale(0.85); }
  70%      { opacity: 1; transform: scale(1.15); }
}
.tut-sq.flashing img { animation: tut-flash 0.7s ease infinite; }

#daily-header{display:flex;flex-direction:column;align-items:center;gap:6px;}
#date-display{font-family:'Fredoka One',cursive;font-size:15px;color:#c0392b;letter-spacing:.5px;}
#streak-row{display:flex;gap:16px;font-size:13px;font-weight:800;color:#7a2020;}
#streak-row span b{color:#c03030;}
#already-solved-banner{display:none;background:#d4f7d4;border:2px solid #3ab03a;border-radius:12px;padding:10px 20px;text-align:center;font-size:13px;color:#1a5a1a;font-weight:700;}
#tier-switcher{display:flex;gap:0;border-radius:14px;overflow:hidden;border:2px solid #c0392b;box-shadow:0 2px 12px rgba(192,57,43,0.15);width:100%;max-width:340px;}
.tier-btn{flex:1;padding:10px 0;font-family:'Fredoka One',cursive;font-size:14px;border:none;cursor:pointer;transition:background 0.18s,color 0.18s;letter-spacing:0.5px;border-radius:0;}
.tier-btn.easy-btn{background:#e8f5e9;color:#1b5e20;}
.tier-btn.medium-btn{background:#fff3e0;color:#e65100;}
.tier-btn.hard-btn{background:#fce4ec;color:#880e4f;}
.tier-btn.active.easy-btn{background:#2e7d32;color:#fff;}
.tier-btn.active.medium-btn{background:#e65100;color:#fff;}
.tier-btn.active.hard-btn{background:#c62828;color:#fff;}
.tier-btn.solved-tier::after{content:' \2713';font-size:11px;opacity:0.9;}
#btn-archive{background:#ffe0b2;border-color:#e65100;color:#bf360c;}
#par-row{display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Fredoka One',cursive;}
#placement-count{font-size:28px;color:#c0392b;line-height:1;}
#par-label{font-size:11px;color:#aaa;font-family:'Nunito',sans-serif;font-weight:700;}
#score-card{display:none;flex-direction:column;align-items:center;gap:6px;background:#fff9f0;border:3px solid #c0392b;border-radius:16px;padding:16px 24px;text-align:center;animation:pop 0.4s ease;width:100%;max-width:340px;}
@keyframes pop{0%{transform:scale(0.7);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
#score-card h2{font-family:'Fredoka One',cursive;color:#c0392b;font-size:20px;}
#score-stars{font-size:28px;letter-spacing:3px;}
#score-detail{font-size:13px;color:#555;font-weight:700;}
#score-time{font-size:12px;color:#bbb;font-style:italic;}

</style>
</head>
<body>
<div id="app">
  <h1>Threat Zone &#9823;&#65039;</h1>
  <div id="subtitle">Threaten every enemy piece &#8212; without letting any of yours get threatened back.</div>

  <div id="daily-header">
    <div id="date-display"></div>
    <div id="streak-row">
      <span>&#128293; Streak: <b id="streak-count">0</b></span>
    </div>
  </div>

  <div id="tier-switcher">
    <button class="tier-btn easy-btn active" onclick="switchTier('easy')">Easy &#9733;&#9734;&#9734;</button>
    <button class="tier-btn medium-btn" onclick="switchTier('medium')">Medium &#9733;&#9733;&#9734;</button>
    <button class="tier-btn hard-btn" onclick="switchTier('hard')">Hard &#9733;&#9733;&#9733;</button>
  </div>

  <div id="score-row">
    <span id="timer-display">00:00</span>
  </div>


  <div id="par-row">
    <div id="placement-count">0</div>
    <div id="par-label">placements</div>
  </div>

  <div id="score-card">
    <h2>Puzzle Solved!</h2>
    <div id="score-stars"></div>
    <div id="score-detail"></div>
    <div id="score-time"></div>
  </div>

  <div id="already-solved-banner"></div>
  <div id="score-card" style="display:none;flex-direction:column;align-items:center;gap:6px;background:#fff9f0;border:3px solid #c0392b;border-radius:16px;padding:16px 24px;text-align:center;width:100%;max-width:340px;">
    <div id="score-stars" style="font-size:28px;letter-spacing:3px;"></div>
    <div id="score-label" style="font-size:20px;font-family:'Fredoka One',cursive;color:#c0392b;"></div>
    <div id="score-detail" style="font-size:12px;color:#aaa;"></div>
  </div>

  <div id="board-wrap">
    <div id="board"></div>
    <div id="board-blur-overlay"><span>&#9208; Paused</span></div>
  </div>

  <div id="legend">
    <div class="leg"><div class="leg-sq" style="background:#ff9999"></div>Enemy threatened</div>
    <div class="leg"><div class="leg-sq" style="background:#90ee90"></div>Your piece safe</div>
    <div class="leg"><div class="leg-sq" style="background:#ff5555"></div>Your piece threatened!</div>
  </div>

  <div id="piece-select"><span>Place:</span></div>

  <div id="controls">
    <button id="btn-pause">&#9208; Pause</button>
    <button id="btn-hint">Hint &#10022;</button>
    <button id="btn-share">Share</button>
    <button id="btn-archive">Archive &#9776;</button>
    <button id="btn-tutorial">How to Play</button>
  </div>

  <div id="feedback" class="fb-idle">Select a piece above, then click a square.</div>
</div>

<!-- Archive drawer -->
<div id="drawer-overlay"></div>
<div id="drawer">
  <div id="drawer-header">
    <h2>&#128218; Archive</h2>
    <button id="drawer-close">&#10005;</button>
  </div>
  <div id="drawer-list"></div>
</div>

<div id="tutorial-overlay">
  <div id="tutorial-modal">
    <button id="tutorial-close">&#10005;</button>
    <h2>&#9823;&#65039; Threat Zone</h2>
    <div id="tutorial-content"></div>
  </div>
</div>
