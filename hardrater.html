<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Hard Puzzle Rater</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Trebuchet MS',sans-serif;background:linear-gradient(135deg,#1a4a1a,#4a1a1a);min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:12px;color:#f5e6c8;}
h1{font-size:18px;color:#c0392b;margin-bottom:2px;text-align:center;}
.subtitle{font-size:11px;color:#aaa;margin-bottom:8px;text-align:center;}
.nav{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.nav button{background:#c0392b;border:none;color:#fff;font-family:'Trebuchet MS',sans-serif;font-weight:700;font-size:13px;padding:7px 14px;border-radius:8px;cursor:pointer;}
.nav button:disabled{background:#333;color:#666;cursor:default;}
.puzzle-num{font-size:14px;font-weight:700;color:#f5e6c8;min-width:80px;text-align:center;}
.stats-row{display:flex;gap:16px;justify-content:center;align-items:baseline;margin-bottom:4px;}
#placement-count{font-size:24px;font-weight:700;color:#c0392b;}
.stat-label{font-size:12px;color:#aaa;}
#timer-display{font-size:14px;color:#aaa;font-weight:600;}
:root{--sq:min(calc((100vw - 32px)/5), 68px);}
#board{display:grid;grid-template-columns:repeat(5,var(--sq));grid-template-rows:repeat(5,var(--sq));border:3px solid #c0392b;border-radius:6px;overflow:hidden;}
.sq{width:var(--sq);height:var(--sq);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.sq.light{background:#8b5e3c;}
.sq.dark{background:#4a2f1a;}
.sq.threatened-enemy{background:#cc4444!important;}
.sq.safe-mine{background:#2d7a3a!important;}
.sq.threatened-mine{background:#aa2222!important;}
.piece{width:74%;height:74%;object-fit:contain;pointer-events:none;user-select:none;}
#piece-select{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:8px;flex-wrap:wrap;}
.sel-piece{width:50px;height:50px;border-radius:10px;border:2px solid #555;background:#1a2d40;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sel-piece img{width:68%;height:68%;object-fit:contain;}
.sel-piece.active{border-color:#c0392b;background:#2a1a1a;}
.sel-piece.empty{opacity:0.3;cursor:default;}
#feedback{margin-top:6px;font-size:12px;color:#a0b0c0;text-align:center;min-height:16px;padding:0 8px;}
.rate-row{display:flex;gap:10px;justify-content:center;margin-top:8px;}
.rate-btn{border:none;font-family:'Trebuchet MS',sans-serif;font-weight:800;font-size:15px;padding:10px 32px;border-radius:12px;cursor:pointer;opacity:0.7;transition:opacity 0.1s,transform 0.1s;}
.rate-btn:hover{opacity:1;transform:scale(1.04);}
.rate-btn.selected{opacity:1;transform:scale(1.06);outline:2px solid #fff;}
#btn-pass{background:#2e7d32;color:#fff;}
#btn-fail{background:#c62828;color:#fff;}
.aux-row{display:flex;gap:8px;justify-content:center;margin-top:6px;}
.aux-btn{border:none;font-family:'Trebuchet MS',sans-serif;font-size:11px;font-weight:700;padding:5px 12px;border-radius:7px;cursor:pointer;}
#btn-sol{background:#333;color:#aaa;}
#btn-skip{background:#2a2a2a;color:#666;}
.progress-bar-wrap{width:100%;max-width:360px;background:#1a1a1a;border-radius:6px;height:6px;margin:6px 0;}
.progress-bar{height:6px;border-radius:6px;background:linear-gradient(90deg,#2e7d32,#c0392b);transition:width 0.3s;}
.progress-text{font-size:10px;color:#666;text-align:center;margin-bottom:4px;}
#results-table{margin-top:12px;width:100%;max-width:420px;border-collapse:collapse;font-size:11px;}
#results-table th{color:#c0392b;text-align:left;padding:3px 6px;border-bottom:1px solid #333;}
#results-table td{padding:3px 6px;color:#444;border-bottom:1px solid #1a1a1a;}
#results-table tr.pass td{color:#aaa;}
#results-table tr.fail td{color:#555;}
#results-table tr.current td{color:#f5e6c8;background:#1a1a1a;}
.tag-pass{color:#4caf50;font-weight:700;}
.tag-fail{color:#ef5350;font-weight:700;}
.tag-q{color:#f5a623;font-size:10px;}
.export-section{margin-top:12px;width:100%;max-width:420px;display:flex;flex-direction:column;gap:6px;}
#btn-export{background:#1a3a5a;border:1px solid #2a5a8a;color:#7ab0d0;font-family:'Trebuchet MS',sans-serif;font-size:12px;font-weight:700;padding:8px;border-radius:8px;cursor:pointer;text-align:center;}
#btn-export:hover{background:#2a4a6a;}
#btn-clear{background:#2a1a1a;border:1px solid #4a2a2a;color:#8a5a5a;font-family:'Trebuchet MS',sans-serif;font-size:11px;padding:6px;border-radius:8px;cursor:pointer;text-align:center;}
#export-status{font-size:11px;color:#4caf50;text-align:center;min-height:14px;}
.summary{font-size:11px;color:#aaa;text-align:center;margin-top:4px;}
</style>
</head>
<body>
<h1>♟ Hard Puzzle Rater</h1>
<p class="subtitle">Pass = hard enough · Fail = too easy · You don't need to solve it</p>

<div class="nav">
  <button id="btn-prev" onclick="changePuzzle(-1)">← Prev</button>
  <span class="puzzle-num" id="pnum">1 / 270</span>
  <button id="btn-next" onclick="changePuzzle(1)">Next →</button>
</div>

<div class="stats-row">
  <span id="placement-count">0</span><span class="stat-label">placements</span>
  <span id="timer-display">00:00</span>
</div>

<div class="progress-text" id="progress-text">0 rated (0 pass / 0 fail)</div>
<div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>

<div id="board"></div>
<div id="piece-select"></div>
<div id="feedback">Select a piece, then place it.</div>

<div class="rate-row">
  <button class="rate-btn" id="btn-pass" onclick="rate('pass')">✓ Pass</button>
  <button class="rate-btn" id="btn-fail" onclick="rate('fail')">✗ Fail</button>
</div>
<div class="aux-row">
  <button class="aux-btn" id="btn-sol" onclick="showSolution()">Show Solution</button>
  <button class="aux-btn" id="btn-skip" onclick="skip()">Skip</button>
</div>

<div class="summary" id="summary"></div>

<table id="results-table">
  <thead><tr><th>#</th><th>Enemies · Player</th><th>Rating</th><th>Plc</th><th>Time</th></tr></thead>
  <tbody id="results-body"></tbody>
</table>

<div class="export-section">
  <button id="btn-export" onclick="exportPassed()">📋 Copy Passed Puzzles JSON</button>
  <button id="btn-clear" onclick="clearSaved()">🗑 Clear All Saved Progress</button>
  <div id="export-status"></div>
</div>

function nk(r,c){return r*5+c;}
function fk(k){return[Math.floor(k/5),k%5];}
function inB(r,c){return r>=0&&r<5&&c>=0&&c<5;}
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function hasQ(p){return p.enemies.some(e=>e.t==='Q')||p.myTypes.includes('Q');}

function startTimer(){if(timerRunning)return;timerRunning=true;timerInterval=setInterval(()=>{timerSeconds++;document.getElementById('timer-display').textContent=fmt(timerSeconds);},1000);}
function stopTimer(){clearInterval(timerInterval);timerRunning=false;}
function resetTimer(){stopTimer();timerSeconds=0;document.getElementById('timer-display').textContent='00:00';}

function getAttacks(type,r,c,occ,pd){
  const out=new Set();
  if(type==='N'){for(const[dr,dc]of[[2,1],[2,-1],[-2,1],[-2,-1],[1,2],[1,-2],[-1,2],[-1,-2]])if(inB(r+dr,c+dc))out.add(nk(r+dr,c+dc));}
  else if(type==='P'){for(const[dr,dc]of[[pd,-1],[pd,1]])if(inB(r+dr,c+dc))out.add(nk(r+dr,c+dc));}
  else{const dirs=[];if(type==='R'||type==='Q')dirs.push([0,1],[0,-1],[1,0],[-1,0]);if(type==='B'||type==='Q')dirs.push([1,1],[1,-1],[-1,1],[-1,-1]);for(const[dr,dc]of dirs){let nr=r+dr,nc=c+dc;while(inB(nr,nc)){out.add(nk(nr,nc));if(occ.has(nk(nr,nc)))break;nr+=dr;nc+=dc;}}}
  return out;
}

function computeThreats(){
  const occ=new Set([...puzzle.enemies.map(e=>e.k),...Object.keys(myBoard).map(Number)]);
  const eT=new Set(),mT=new Set();
  for(const e of puzzle.enemies){const[r,c]=fk(e.k);for(const s of getAttacks(e.t,r,c,occ,1))eT.add(s);}
  for(const[k,t]of Object.entries(myBoard)){const[r,c]=fk(Number(k));for(const s of getAttacks(t,r,c,occ,-1))mT.add(s);}
  return{eT,mT};
}

function isValid(enemies,mine){
  const occ=new Set([...enemies.map(e=>e.k),...mine.map(m=>m.k)]);
  const eT=new Set();
  for(const e of enemies){const[r,c]=fk(e.k);for(const s of getAttacks(e.t,r,c,occ,1))eT.add(s);}
  const eKeys=new Set(enemies.map(e=>e.k));
  const coverage=mine.map(m=>{const[r,c]=fk(m.k);const atk=getAttacks(m.t,r,c,occ,-1);const cov=new Set();for(const k of atk)if(eKeys.has(k))cov.add(k);return cov;});
  for(const m of mine)if(eT.has(m.k))return false;
  for(const e of enemies)if(!coverage.some(c=>c.has(e.k)))return false;
  for(let i=0;i<mine.length;i++){const others=new Set();for(let j=0;j<mine.length;j++)if(j!==i)for(const k of coverage[j])others.add(k);if(![...coverage[i]].some(k=>!others.has(k)))return false;}
  return true;
}

function remCounts(){
  const placed={};for(const t of Object.values(myBoard))placed[t]=(placed[t]||0)+1;
  const rem={};for(const t of puzzle.myTypes)rem[t]=(rem[t]||0)+1;
  for(const[t,n]of Object.entries(placed))rem[t]=(rem[t]||0)-n;
  return rem;
}

  const img=document.createElement('img');
  img.className='piece';
  img.src=(type==='K'?KING_IMGS[side]:PIECE_IMGS[side][type])||'';
  return img;
}

function renderBoard(){
  const el=document.getElementById('board');el.innerHTML='';
  const{eT,mT}=computeThreats();
  for(let r=0;r<5;r++)for(let c=0;c<5;c++){
    const sq=document.createElement('div');
    const k=nk(r,c);
    sq.className='sq '+((r+c)%2===0?'light':'dark');
    const enemy=puzzle.enemies.find(e=>e.k===k);
    const myT=myBoard[k];
    if(enemy&&mT.has(k))sq.classList.add('threatened-enemy');
    if(myT!=null)sq.classList.add(eT.has(k)?'threatened-mine':'safe-mine');
    if(enemy)sq.appendChild(makePiece(enemy.t,'enemy'));
    else if(myT!=null)sq.appendChild(makePiece(myT,'player'));
    sq.addEventListener('click',()=>onClick(k));
    el.appendChild(sq);
  }
}

function onClick(k){
  if(puzzle.enemies.find(e=>e.k===k))return;
  if(myBoard[k]!=null){delete myBoard[k];selectedType=null;renderBoard();renderSel();updateFeedback();return;}
  if(!selectedType)return;
  const rem=remCounts();
  if((rem[selectedType]||0)<=0){document.getElementById('feedback').textContent='No '+selectedType+' left.';return;}
  myBoard[k]=selectedType;selectedType=null;
  placements++;document.getElementById('placement-count').textContent=placements;
  renderBoard();renderSel();
  const mine=Object.entries(myBoard).map(([k,t])=>({t,k:Number(k)}));
  if(mine.length===puzzle.myTypes.length&&isValid(puzzle.enemies,mine)){
    stopTimer();
    document.getElementById('feedback').textContent='✓ Solved! Rate the difficulty:';
  } else {updateFeedback();}
}

function updateFeedback(){
  const{mT}=computeThreats();
  const covered=puzzle.enemies.filter(e=>mT.has(e.k)).length;
  const rem=puzzle.myTypes.length-Object.keys(myBoard).length;
  document.getElementById('feedback').textContent=covered+'/'+puzzle.enemies.length+' threatened. '+rem+' piece(s) left.';
}

function renderSel(){
  const el=document.getElementById('piece-select');el.innerHTML='';
  const rem=remCounts();const seen={};
  for(const t of puzzle.myTypes){
    if(seen[t])continue;seen[t]=true;
    const total=puzzle.myTypes.filter(x=>x===t).length;
    for(let i=0;i<total;i++){
      const avail=(rem[t]||0)>i;
      const btn=document.createElement('div');
      btn.className='sel-piece'+(selectedType===t&&avail?' active':'')+(avail?'':' empty');
      btn.appendChild(makePiece(t,'player'));
      if(avail)btn.addEventListener('click',()=>{selectedType=t;renderSel();});
      el.appendChild(btn);
    }
  }
}

function rate(r){
  stopTimer();
  results[idx].rating=r;
  results[idx].placements=placements;
  results[idx].time=timerSeconds;
  saveResults();
  renderResults();
  updateProgress();
  // Auto-advance to next unrated puzzle
  const next=results.findIndex((res,i)=>i>idx&&res.rating===null&&!res.skipped);
  if(next!==-1)loadPuzzle(next);
  else{
    const anyUnrated=results.find(res=>res.rating===null&&!res.skipped);
    if(!anyUnrated)document.getElementById('feedback').textContent='All puzzles rated! Export your results.';
  }
}

function skip(){
  results[idx].skipped=true;
  saveResults();
  const next=results.findIndex((res,i)=>i>idx&&res.rating===null&&!res.skipped);
  if(next!==-1)loadPuzzle(next);
}

function loadPuzzle(i){
  stopTimer();
  idx=i;puzzle=PUZZLES[i];myBoard={};selectedType=null;placements=0;
  document.getElementById('placement-count').textContent='0';
  resetTimer();startTimer();
  document.getElementById('pnum').textContent=(i+1)+' / '+PUZZLES.length;
  document.getElementById('btn-prev').disabled=i===0;
  document.getElementById('btn-next').disabled=i===PUZZLES.length-1;
  document.getElementById('feedback').textContent='Select a piece, then place it.';
  // Restore rating button state
  document.querySelectorAll('.rate-btn').forEach(b=>b.classList.remove('selected'));
  if(results[i].rating)document.getElementById('btn-'+results[i].rating).classList.add('selected');
  renderBoard();renderSel();
  updateProgress();
  // Scroll current row into view in table
  setTimeout(()=>{
    const rows=document.querySelectorAll('#results-body tr');
    if(rows[i])rows[i].scrollIntoView({block:'nearest'});
  },50);
}

function changePuzzle(dir){loadPuzzle(Math.max(0,Math.min(PUZZLES.length-1,idx+dir)));}

function showSolution(){
  stopTimer();
  const eKeys=new Set(puzzle.enemies.map(e=>e.k));
  const empties=[];for(let i=0;i<25;i++)if(!eKeys.has(i))empties.push(i);
  const sorted=[...puzzle.myTypes].sort((a,b)=>['Q','R','B','N','P'].indexOf(a)-['Q','R','B','N','P'].indexOf(b));
  let sol=null;
  function bt(i,placed,used){if(sol)return;if(i===sorted.length){if(isValid(puzzle.enemies,placed))sol=[...placed];return;}for(const sq of empties){if(used.has(sq))continue;used.add(sq);placed.push({t:sorted[i],k:sq});bt(i+1,placed,used);placed.pop();used.delete(sq);if(sol)return;}}
  bt(0,[],new Set());
  if(sol){myBoard={};for(const m of sol)myBoard[m.k]=m.t;renderBoard();renderSel();document.getElementById('feedback').textContent='Solution shown — rate anyway?';}
}

function updateProgress(){
  const rated=results.filter(r=>r.rating!==null).length;
  const passed=results.filter(r=>r.rating==='pass').length;
  const failed=results.filter(r=>r.rating==='fail').length;
  const pct=Math.round(rated/PUZZLES.length*100);
  document.getElementById('progress-text').textContent=rated+' rated ('+passed+' pass / '+failed+' fail)';
  document.getElementById('progress-bar').style.width=pct+'%';
  // Summary: queen vs non-queen stats
  const qPass=results.filter(r=>r.rating==='pass'&&hasQ(PUZZLES[r.idx])).length;
  const qFail=results.filter(r=>r.rating==='fail'&&hasQ(PUZZLES[r.idx])).length;
  const nqPass=results.filter(r=>r.rating==='pass'&&!hasQ(PUZZLES[r.idx])).length;
  const nqFail=results.filter(r=>r.rating==='fail'&&!hasQ(PUZZLES[r.idx])).length;
  if(rated>5){
    document.getElementById('summary').textContent=
      'With queen ♛: '+qPass+' pass / '+qFail+' fail  ·  No queen: '+nqPass+' pass / '+nqFail+' fail';
  }
}

function renderResults(){
  const tbody=document.getElementById('results-body');tbody.innerHTML='';
  results.forEach((r,i)=>{
    const tr=document.createElement('tr');
    tr.className=r.rating==='pass'?'pass':r.rating==='fail'?'fail':i===idx?'current':'';
    const ep=PUZZLES[i].enemies.map(e=>PC[e.t]).join('');
    const pp=PUZZLES[i].myTypes.map(t=>PC[t]).join('');
    const qTag=hasQ(PUZZLES[i])?'<span class="tag-q">♛</span>':'';
    const rTag=r.rating==='pass'?'<span class="tag-pass">PASS</span>':r.rating==='fail'?'<span class="tag-fail">FAIL</span>':r.skipped?'skip':'';
    tr.innerHTML='<td>'+(i+1)+'</td><td>'+ep+' · '+pp+qTag+'</td><td>'+rTag+'</td>'
      +'<td>'+(r.placements!==null?r.placements:'—')+'</td>'
      +'<td>'+(r.time!==null?fmt(r.time):'—')+'</td>';
    tbody.appendChild(tr);
  });
}

function exportPassed(){
  const passed=results.filter(r=>r.rating==='pass').map(r=>({
    ...PUZZLES[r.idx],
    ratingData:{placements:r.placements,time:r.time,hasQueen:hasQ(PUZZLES[r.idx])}
  }));
  const out=JSON.stringify(passed);
  navigator.clipboard.writeText(out).then(()=>{
    document.getElementById('export-status').textContent='✓ '+passed.length+' passed puzzles copied!';
    setTimeout(()=>document.getElementById('export-status').textContent='',3000);
  }).catch(()=>{
    // Fallback: show in textarea
    const ta=document.createElement('textarea');
    ta.value=out;ta.style.cssText='position:fixed;top:10px;left:10px;width:90%;height:200px;z-index:9999;font-size:10px;';
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    document.getElementById('export-status').textContent='✓ Copied (fallback)!';
    setTimeout(()=>document.getElementById('export-status').textContent='',3000);
  });
}

function clearSaved(){
  if(confirm('Clear ALL saved ratings and progress? This cannot be undone.')){
    localStorage.removeItem(STORAGE_KEY);
    results=PUZZLES.map((_,i)=>({idx:i,rating:null,placements:null,time:null,skipped:false}));
    renderResults();updateProgress();
    document.getElementById('export-status').textContent='Cleared.';
    setTimeout(()=>document.getElementById('export-status').textContent='',2000);
  }
}

renderResults();
updateProgress();
loadPuzzle(0);
</script>

</html>
